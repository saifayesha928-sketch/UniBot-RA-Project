<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BZU UniBot</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>

        <div class="logo">
            🎓
        </div>

        <div>
            <h1>BZU UniBot</h1>
            <p>Bahauddin Zakariya University, Multan</p>
        </div>

    </header>

    <main>

        <h2>Welcome to BZU UniBot</h2>

        <p class="subtitle">
            Ask anything about admissions, programs, scholarships,
            fee structure, faculty and university information.
        </p>

        <div class="chips">

            <button class="chip">Programs</button>

            <button class="chip">Admissions</button>

            <button class="chip">Fee Structure</button>

            <button class="chip">Scholarships</button>

            <button class="chip">Faculty</button>

        </div>

        <div id="chatBox"></div>

        <div class="input-area">

            <input
                id="question"
                type="text"
                placeholder="Ask your question..."
            >

            <button id="askBtn">
                Ask
            </button>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
